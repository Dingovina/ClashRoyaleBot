runtime:
  # Match identifier used for ML raw-frame collection under data/raw/<match_id>/.
  match_id: local-match-001
  # --- Policy thresholds ---
  tick_interval_ms: 500
  action_rate_limit_ms: 500
  action_confidence_threshold: 0.70
  no_op_confidence_threshold: 0.55
  min_elixir_for_non_urgent_action: 11.0


  # --- Match lifecycle ---
  # Raised threshold for stricter match-start readiness.
  battlefield_score_threshold: 0.95

  # --- Capture/debug ---
  # When false, no PNG frames are written under capture_debug_dir (e.g. data/raw).
  capture_debug_save_enabled: true
  capture_debug_dir: data/raw
  capture_every_n_ticks: 10

  # --- Actuation ---
  # Always live in this runtime profile.

  # --- Perception models ---
  # Battlefield/elixir/card models are always enabled in this runtime profile.

  # --- Runtime viewport mapping ---
  # Clash in Google Play Games: portrait playfield centered on a wide monitor.
  # Anchors in board.zones are normalized within this rectangle (not the full capture).
  game_viewport:
    mode: centered_strip
    width: 608
    height: 1080
    # Board anchors (0..1) map inside this rectangle of the game client, not the hand bar at the bottom.
    # Tune with a screenshot: top_ratio skips top HUD; height_ratio ends above the card row.
    anchor_rect:
      left_ratio: 0.0
      top_ratio: 0.08
      width_ratio: 1.0
      height_ratio: 0.68

board:
  zones:
    "0": [0.17, 0.125]
    "1": [0.50, 0.125]
    "2": [0.83, 0.125]
    "3": [0.17, 0.375]
    "4": [0.50, 0.375]
    "5": [0.83, 0.375]
    "6": [0.17, 0.625]
    "7": [0.50, 0.625]
    "8": [0.83, 0.625]
    "9": [0.17, 0.875]
    "10": [0.50, 0.875]
    "11": [0.83, 0.875]
